<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" role="img" aria-label="场景选型">
  <rect width="1536" height="1024" fill="#fbf6ec"/>
  <rect x="42" y="42" width="1452" height="940" rx="26" fill="#fffdf8" stroke="#d8c7ad" stroke-width="2"/>
  <text x="768" y="142" text-anchor="middle" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="62" font-weight="800" fill="#20251f">场景选型</text>
  <text x="768" y="190" text-anchor="middle" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="25" fill="#6d6252">按你的任务类型直接选，不再纠结“哪个工具最强”</text>
  <g font-family="Microsoft YaHei UI, PingFang SC, sans-serif">
    <g transform="translate(104 244)">
      <rect width="408" height="540" rx="20" fill="#fff9ee" stroke="#d8c7ad" stroke-width="2"/>
      <circle cx="86" cy="94" r="48" fill="#edf5ef"/>
      <text x="86" y="114" text-anchor="middle" font-size="54" font-weight="800" fill="#2f7f6c">✓</text>
      <text x="204" y="226" text-anchor="middle" font-size="34" font-weight="800" fill="#20251f">日常稳定抓取</text>
      <text x="204" y="310" text-anchor="middle" font-size="22" fill="#6d6252">每天 / 每周跑批</text>
      <text x="204" y="344" text-anchor="middle" font-size="22" fill="#6d6252">导出结构化字段</text>
      <line x1="80" y1="382" x2="328" y2="382" stroke="#8f5e2c" stroke-width="3"/>
      <text x="204" y="426" text-anchor="middle" font-size="18" fill="#8f5e2c">推荐主工具</text>
      <text x="204" y="478" text-anchor="middle" font-size="28" font-weight="800" fill="#20251f">Playwright</text>
      <text x="204" y="532" text-anchor="middle" font-size="22" fill="#2f7f6c">CSV / SQLite / Parquet</text>
    </g>
    <g transform="translate(566 244)">
      <rect width="408" height="540" rx="20" fill="#fff9ee" stroke="#d8c7ad" stroke-width="2"/>
      <circle cx="86" cy="94" r="48" fill="#edf5ef"/>
      <text x="86" y="114" text-anchor="middle" font-size="54" font-weight="800" fill="#2f7f6c">✓</text>
      <text x="204" y="226" text-anchor="middle" font-size="34" font-weight="800" fill="#20251f">真实浏览器接管</text>
      <text x="204" y="310" text-anchor="middle" font-size="22" fill="#6d6252">已登录并打开页面</text>
      <text x="204" y="344" text-anchor="middle" font-size="22" fill="#6d6252">需要模型读取现场</text>
      <line x1="80" y1="382" x2="328" y2="382" stroke="#8f5e2c" stroke-width="3"/>
      <text x="204" y="426" text-anchor="middle" font-size="18" fill="#8f5e2c">推荐主工具</text>
      <text x="204" y="478" text-anchor="middle" font-size="28" font-weight="800" fill="#20251f">CDP Bridge MCP</text>
      <text x="204" y="532" text-anchor="middle" font-size="22" fill="#2f7f6c">OpenCLI 辅助操作</text>
    </g>
    <g transform="translate(1028 244)">
      <rect width="408" height="540" rx="20" fill="#fff9ee" stroke="#d8c7ad" stroke-width="2"/>
      <circle cx="86" cy="94" r="48" fill="#edf5ef"/>
      <text x="86" y="114" text-anchor="middle" font-size="54" font-weight="800" fill="#2f7f6c">✓</text>
      <text x="204" y="226" text-anchor="middle" font-size="34" font-weight="800" fill="#20251f">探索式调试</text>
      <text x="204" y="310" text-anchor="middle" font-size="22" fill="#6d6252">按钮 / iframe / 滚动</text>
      <text x="204" y="344" text-anchor="middle" font-size="22" fill="#6d6252">下载路径不稳定</text>
      <line x1="80" y1="382" x2="328" y2="382" stroke="#8f5e2c" stroke-width="3"/>
      <text x="204" y="426" text-anchor="middle" font-size="18" fill="#8f5e2c">推荐主工具</text>
      <text x="204" y="478" text-anchor="middle" font-size="28" font-weight="800" fill="#20251f">playwright-cli</text>
      <text x="204" y="532" text-anchor="middle" font-size="22" fill="#2f7f6c">最终转 Playwright</text>
    </g>
  </g>
  <text x="768" y="930" text-anchor="middle" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#20251f">判断顺序：先看是否要长期批处理，再看是否必须复用真实登录态，最后才看探索效率。</text>
</svg>
