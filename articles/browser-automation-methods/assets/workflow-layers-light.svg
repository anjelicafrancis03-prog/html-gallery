  <text x="768" y="190" text-anchor="middle" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="25" fill="#6d6252">看现场、试动作、固化路径、批量生产，四层分工</text>
  <g font-family="Microsoft YaHei UI, PingFang SC, sans-serif">
