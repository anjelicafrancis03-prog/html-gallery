      <text x="160" y="52" font-size="34" font-weight="800" fill="#20251f">playwright-cli</text>
      <text x="160" y="92" font-size="22" fill="#2f7f6c">探索并固化路径</text>
      <text x="540" y="52" font-size="22" fill="#6d6252">处理按钮、iframe、下载、滚动，沉淀稳定选择器</text>
