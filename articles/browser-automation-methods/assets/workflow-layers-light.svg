      <rect x="28" y="25" width="88" height="76" rx="14" fill="#8f5e2c"/>
      <text x="72" y="73" text-anchor="middle" font-size="34" font-weight="800" fill="#fffdf8">02</text>
      <text x="160" y="52" font-size="34" font-weight="800" fill="#20251f">OpenCLI</text>
      <text x="160" y="92" font-size="22" fill="#2f7f6c">快速完成页面操作</text>
      <text x="540" y="52" font-size="22" fill="#6d6252">open / state / click / extract，适合临时搜索、验证、排障</text>
    </g>
    <path d="M768 524v34m0 0-12-14m12 14 12-14" fill="none" stroke="#b89a6a" stroke-width="4"/>
