      <rect x="28" y="25" width="88" height="76" rx="14" fill="#8f5e2c"/>
      <text x="72" y="73" text-anchor="middle" font-size="34" font-weight="800" fill="#fffdf8">04</text>
      <text x="160" y="52" font-size="34" font-weight="800" fill="#20251f">Playwright</text>
