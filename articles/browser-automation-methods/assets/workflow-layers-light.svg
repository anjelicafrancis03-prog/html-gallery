      <text x="160" y="92" font-size="22" fill="#2f7f6c">读真实浏览器现场</text>
      <text x="540" y="52" font-size="22" fill="#6d6252">复用已登录 Chrome，读取标签页、正文、Cookie，执行轻量 JS</text>
    </g>
    <path d="M768 368v34m0 0-12-14m12 14 12-14" fill="none" stroke="#b89a6a" stroke-width="4"/>
    <g transform="translate(210 398)">
