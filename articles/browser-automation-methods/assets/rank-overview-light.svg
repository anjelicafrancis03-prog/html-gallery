<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" role="img" aria-label="浏览器方式总评定">
  <rect width="1536" height="1024" fill="#fbf6ec"/>
  <rect x="42" y="42" width="1452" height="940" rx="26" fill="#fffdf8" stroke="#d8c7ad" stroke-width="2"/>
  <text x="768" y="142" text-anchor="middle" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="62" font-weight="800" fill="#20251f">浏览器方式总评定</text>
  <text x="768" y="190" text-anchor="middle" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="25" fill="#6d6252">先分清：谁做生产主力，谁做会话接管，谁只适合探索或降级</text>
  <g font-family="Microsoft YaHei UI, PingFang SC, sans-serif">
    <g transform="translate(96 232)">
      <rect width="1344" height="82" rx="14" fill="#f3dfbd" stroke="#d8c7ad" stroke-width="2"/>
      <text x="65" y="57" text-anchor="middle" font-size="48" font-family="Georgia, serif" font-weight="800" fill="#8f5e2c">1</text>
      <text x="134" y="52" font-size="30" font-weight="800" fill="#20251f">Playwright CDP</text>
      <text x="494" y="52" font-size="22" fill="#2f7f6c">生产主力</text>
      <text x="730" y="52" text-anchor="middle" font-size="30" font-weight="800" fill="#8f5e2c">9.2</text>
      <text x="824" y="52" font-size="22" fill="#6d6252">长期脚本、定时任务、字段抽取最稳</text>
    </g>
    <g transform="translate(96 324)">
      <rect width="1344" height="82" rx="14" fill="#e7f2eb" stroke="#d8c7ad" stroke-width="2"/>
      <text x="65" y="57" text-anchor="middle" font-size="48" font-family="Georgia, serif" font-weight="800" fill="#8f5e2c">2</text>
      <text x="134" y="52" font-size="30" font-weight="800" fill="#20251f">CDP Bridge MCP</text>
      <text x="494" y="52" font-size="22" fill="#2f7f6c">真实会话</text>
      <text x="730" y="52" text-anchor="middle" font-size="30" font-weight="800" fill="#8f5e2c">8.5</text>
      <text x="824" y="52" font-size="22" fill="#6d6252">接管已登录浏览器，读当前标签页和执行 JS</text>
    </g>
    <g transform="translate(96 416)">
      <rect width="1344" height="82" rx="14" fill="#fff9ee" stroke="#d8c7ad" stroke-width="2"/>
      <text x="65" y="57" text-anchor="middle" font-size="48" font-family="Georgia, serif" font-weight="800" fill="#8f5e2c">3</text>
      <text x="134" y="52" font-size="30" font-weight="800" fill="#20251f">OpenCLI</text>
      <text x="494" y="52" font-size="22" fill="#2f7f6c">快速操作</text>
      <text x="730" y="52" text-anchor="middle" font-size="30" font-weight="800" fill="#8f5e2c">8.0</text>
      <text x="824" y="52" font-size="22" fill="#6d6252">打开、点击、state、extract，适合快速验证</text>
    </g>
    <g transform="translate(96 508)">
      <rect width="1344" height="82" rx="14" fill="#fff9ee" stroke="#d8c7ad" stroke-width="2"/>
      <text x="65" y="57" text-anchor="middle" font-size="48" font-family="Georgia, serif" font-weight="800" fill="#8f5e2c">4</text>
      <text x="134" y="52" font-size="30" font-weight="800" fill="#20251f">playwright-cli</text>
      <text x="494" y="52" font-size="22" fill="#2f7f6c">探索固化</text>
      <text x="730" y="52" text-anchor="middle" font-size="30" font-weight="800" fill="#8f5e2c">7.7</text>
      <text x="824" y="52" font-size="22" fill="#6d6252">边看页面边调选择器，最后沉淀脚本</text>
    </g>
    <g transform="translate(96 600)">
      <rect width="1344" height="82" rx="14" fill="#fff9ee" stroke="#d8c7ad" stroke-width="2"/>
      <text x="65" y="57" text-anchor="middle" font-size="48" font-family="Georgia, serif" font-weight="800" fill="#8f5e2c">5</text>
      <text x="134" y="52" font-size="30" font-weight="800" fill="#20251f">raw CDP</text>
      <text x="494" y="52" font-size="22" fill="#2f7f6c">底层急救</text>
      <text x="730" y="52" text-anchor="middle" font-size="30" font-weight="800" fill="#8f5e2c">6.8</text>
      <text x="824" y="52" font-size="22" fill="#6d6252">排查 9223、DOM、请求，维护成本高</text>
    </g>
    <g transform="translate(96 692)">
      <rect width="1344" height="82" rx="14" fill="#fff9ee" stroke="#d8c7ad" stroke-width="2"/>
      <text x="65" y="57" text-anchor="middle" font-size="48" font-family="Georgia, serif" font-weight="800" fill="#8f5e2c">6</text>
      <text x="134" y="52" font-size="30" font-weight="800" fill="#20251f">Codex Chrome 插件</text>
      <text x="494" y="52" font-size="22" fill="#2f7f6c">交互辅助</text>
      <text x="730" y="52" text-anchor="middle" font-size="30" font-weight="800" fill="#8f5e2c">6.5</text>
      <text x="824" y="52" font-size="22" fill="#6d6252">辅助浏览器任务，不承担主爬虫线</text>
    </g>
    <g transform="translate(96 784)">
      <rect width="1344" height="82" rx="14" fill="#fff9ee" stroke="#d8c7ad" stroke-width="2"/>
      <text x="65" y="57" text-anchor="middle" font-size="48" font-family="Georgia, serif" font-weight="800" fill="#8f5e2c">7</text>
      <text x="134" y="52" font-size="30" font-weight="800" fill="#20251f">HTTP / Scrapy</text>
      <text x="494" y="52" font-size="22" fill="#2f7f6c">降级路线</text>
      <text x="730" y="52" text-anchor="middle" font-size="30" font-weight="800" fill="#8f5e2c">4.0</text>
      <text x="824" y="52" font-size="22" fill="#6d6252">静态页面可用，动态登录社媒不占优</text>
    </g>
  </g>
  <text x="768" y="930" text-anchor="middle" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#20251f">最终保留：Playwright 做生产线；CDP Bridge / OpenCLI / playwright-cli 做探索、接管和调试。</text>
</svg>
